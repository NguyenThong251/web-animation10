name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This Vite/Three.js app references every asset with RELATIVE paths
      # (./assets/…, "sounds/…", "terrain/…", ktx/glb dirs — no leading slash),
      # so they resolve relative to the page and work under the /web-animation10
      # subpath with NO path rewriting. Just disable Jekyll. (Verified locally
      # under the subpath with real WebGL: game renders, 0 same-origin 404s.)
      - name: Prepare site
        run: |
          rm -rf _site && cp -r public _site
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
